# Documentation build check.
#
# Deployment is handled by Cloudflare Pages (Git integration on this repo, custom domain
# graphics.py-numeraire.org). This workflow does NOT deploy — it only builds the Sphinx site with
# warnings-as-errors (including the intersphinx links into py-numeraire.org) so documentation
# regressions are caught in CI, on pull requests too.
name: Docs

on:
  pull_request:
    paths:
      - "docs/**"
      - "src/**"
      - "pyproject.toml"
      - ".github/workflows/docs.yml"
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "src/**"
      - "pyproject.toml"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with: { python-version: "3.12" }
      - run: uv sync --extra docs
      - name: Build docs (warnings are errors)
        run: uv run sphinx-build -W --keep-going -b html docs docs/_build/html
