# Documentation build check.
#
# Deployment is handled by Cloudflare Pages (Git integration, custom domain
# graphics.py-numeraire.org), which builds with `pip install ".[docs]"`. This workflow mirrors that
# build with warnings-as-errors so documentation regressions are caught in CI (pull requests too).
# It does NOT deploy. pip is used (not uv) so numeraire resolves from PyPI, without the local
# `[tool.uv.sources]` sibling checkout that the dev/test CI relies on.
name: Docs

on:
  pull_request:
    paths:
      - "docs/**"
      - "src/**"
      - "pyproject.toml"
      - ".github/workflows/docs.yml"
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "src/**"
      - "pyproject.toml"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # tags so hatch-vcs can derive the version
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build docs (warnings are errors)
        run: |
          python -m pip install --upgrade pip
          pip install ".[docs]"
          sphinx-build -W --keep-going -b html docs docs/_build/html
