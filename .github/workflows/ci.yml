name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      # numeraire is on PyPI, but the local uv source pins the sibling checkout; provide it so the
      # editable path resolves in CI exactly as it does locally.
      - name: Check out numeraire-graphics
        uses: actions/checkout@v4
        with:
          path: numeraire-graphics
          fetch-depth: 0   # full history so hatch-vcs derives the version
      - name: Check out numeraire (dependency)
        uses: actions/checkout@v4
        with:
          repository: py-numeraire/numeraire
          ref: main
          path: numeraire
      - name: Install uv
        uses: astral-sh/setup-uv@v6
      - name: Sync + lint + type-check + test
        working-directory: numeraire-graphics
        run: |
          uv sync --extra dev
          uv run ruff check .
          uv run ruff format --check .
          uv run basedpyright src/numeraire_graphics
          uv run pytest
